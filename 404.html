<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — Sandhya Tripathi</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/assets/styles.css">
<script>
  (function(){ try { var t = localStorage.getItem('theme'); if (t) document.documentElement.setAttribute('data-theme', t); } catch(e){} })();
</script>
<style>
  .nf { min-height: 100vh; display: flex; align-items: center; }
  .nf-inner { max-width: var(--maxw); margin: 0 auto; padding: 0 40px; width: 100%; }
  .nf .code { font-family: ui-monospace, Menlo, monospace; font-size: 13px; letter-spacing: .12em; color: var(--acc); text-transform: uppercase; margin: 0 0 18px; display: flex; align-items: center; gap: 10px; }
  .nf .code .sq { width: 9px; height: 9px; background: var(--acc); display: inline-block; }
  .nf h1 { font-size: clamp(40px, 8vw, 72px); line-height: .95; letter-spacing: -.04em; margin: 0 0 18px; font-weight: 750; }
  .nf p { font-size: 16px; color: var(--mut); max-width: 46ch; line-height: 1.6; margin: 0 0 28px; }
  .nf .links { display: flex; flex-wrap: wrap; border-top: 1px solid var(--line-strong); border-bottom: 1px solid var(--line-strong); max-width: 520px; }
  .nf .links a { font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; padding: 14px 18px; text-decoration: none; color: var(--ink); border-right: 1px solid var(--line); letter-spacing: .03em; }
  .nf .links a:last-child { border-right: 0; }
  .nf .links a:hover, .nf .links a:focus-visible { background: var(--ink); color: var(--bg); }
  @media (max-width: 640px){ .nf-inner { padding: 0 22px; } }
</style>
</head>
<body>
<main class="nf">
  <div class="nf-inner">
    <p class="code"><span class="sq"></span> Error 404</p>
    <h1>Page not found.</h1>
    <p>That page doesn’t exist — it may have moved, or the link was mistyped. Let’s get you back on track.</p>
    <nav class="links">
      <a href="/">HOME</a>
      <a href="/publications.html">PUBLICATIONS</a>
      <a href="/#projects">PROJECTS</a>
      <a href="/#contact">CONTACT</a>
    </nav>
  </div>
</main>
</body>
</html>
